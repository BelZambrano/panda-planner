{% extends "base.html" %}

{% block content %}

<section class="page-header">
    <h2>Editar hábito</h2>
    <p>Modifica tu hábito sin perder el ritmo ✨</p>
</section>

<section class="form-card">
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="{{ form.nombre.id_for_label }}">Nombre</label>
            {{ form.nombre }}
        </div>

        <div class="form-group">
            <label for="{{ form.descripcion.id_for_label }}">Descripción</label>
            {{ form.descripcion }}
        </div>

        <div class="form-group checkbox-group">
            {{ form.completado }}
            <label for="{{ form.completado.id_for_label }}">¿Ya está completado?</label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-main">Guardar cambios</button>
            <a href="{% url 'habitos' %}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</section>

{% endblock %}
